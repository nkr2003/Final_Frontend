<header>
  <div class="container">
    <h1 class="logo">Event Management</h1>
    <nav>
      <ul>
        <li><a routerLink="/">Home</a></li>
        <li><a routerLink="/register">Register</a></li>
        <li><a href="#about">About</a></li>
        <li><a routerLink="/contact">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>


<div class="center-wrapper">
  <div class="login-box">
    <h2>Login</h2>

    <form (ngSubmit)="onLogin()">
      <div>
        <input type="email" placeholder="Enter email" [(ngModel)]="loginData.email" name="email" required>
      </div>
      <div>
        <input type="password" placeholder="Enter password" [(ngModel)]="loginData.passwordHash" name="passwordHash" required>
      </div>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a routerLink="/register">Register here</a></p>

    <p class="error">{{ message }}</p>
  </div>
</div>
